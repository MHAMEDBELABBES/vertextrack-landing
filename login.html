<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/png" href="assets/images/vertextrack-icon.png">
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VERTEXTRACK — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
/* ── Variables ───────────────────────────────────────────── */
:root {
  --bg:     #03080f;
  --bg2:    #060d18;
  --bg3:    #040a14;
  --cyan:   #00c8ff;
  --cyan2:  rgba(0,200,255,0.12);
  --amber:  #f59e0b;
  --green:  #00e676;
  --red:    #ef5350;
  --white:  #ffffff;
  --muted:  rgba(255,255,255,0.45);
  --border: rgba(0,200,255,0.18);
  --border2:rgba(255,255,255,0.06);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Grille HUD de fond ──────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── Logo barre top ──────────────────────────────────────── */
.login-topbar {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 28px 40px 0;
}
.login-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}
.login-logo img {
  height: 36px;
  width: auto;
  mix-blend-mode: lighten;
}
.login-logo-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--white);
}
.login-logo-text span { color: var(--cyan); }

/* ── Conteneur principal ────────────────────────────────── */
.login-wrap {
  position: relative;
  z-index: 10;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px 60px;
}

/* ── Carte de login ──────────────────────────────────────── */
.login-card {
  width: 100%;
  max-width: 420px;
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 44px 40px 40px;
  position: relative;
}

/* Coins HUD */
.login-card::before,
.login-card::after {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
}
.login-card::before {
  top: -1px; left: -1px;
  border-top: 2px solid var(--cyan);
  border-left: 2px solid var(--cyan);
}
.login-card::after {
  bottom: -1px; right: -1px;
  border-bottom: 2px solid var(--cyan);
  border-right: 2px solid var(--cyan);
}

/* ── En-tête carte ───────────────────────────────────────── */
.login-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--cyan);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.login-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 32px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--white);
  line-height: 1;
  margin-bottom: 6px;
}
.login-subtitle {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 32px;
  line-height: 1.5;
}

/* ── Formulaire ──────────────────────────────────────────── */
.form-group {
  margin-bottom: 20px;
}
.form-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.form-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid rgba(0,200,255,0.2);
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  padding: 12px 16px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-input::placeholder { color: rgba(255,255,255,0.2); }
.form-input:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px rgba(0,200,255,0.08);
}

/* ── Mot de passe avec toggle ─────────────────────────────  */
.pwd-wrap {
  position: relative;
}
.pwd-toggle {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 14px;
  padding: 0;
  transition: color 0.2s;
}
.pwd-toggle:hover { color: var(--cyan); }

/* ── Bouton de connexion ─────────────────────────────────── */
.btn-login {
  width: 100%;
  background: var(--cyan);
  color: var(--bg);
  border: none;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 15px;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 14px;
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
  margin-top: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.btn-login:hover:not(:disabled) {
  background: #00a8d8;
  box-shadow: 0 0 28px rgba(0,200,255,0.4);
  transform: translateY(-1px);
}
.btn-login:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

/* Spinner */
.spinner {
  width: 16px;
  height: 16px;
  border: 2px solid rgba(3,8,15,0.3);
  border-top-color: var(--bg);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }
.btn-login.loading .spinner { display: block; }
.btn-login.loading .btn-text { opacity: 0.7; }

/* ── Zone de message (erreur / succès) ─────────────────────  */
.login-msg {
  margin-top: 16px;
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 500;
  border-left: 3px solid transparent;
  display: none;
  line-height: 1.5;
}
.login-msg.error {
  display: block;
  background: rgba(239,83,80,0.1);
  border-left-color: var(--red);
  color: #ff8a80;
}
.login-msg.success {
  display: block;
  background: rgba(0,230,118,0.1);
  border-left-color: var(--green);
  color: var(--green);
}

/* ── Lien retour accueil ─────────────────────────────────── */
.login-back {
  margin-top: 24px;
  text-align: center;
  font-size: 12px;
  color: var(--muted);
}
.login-back a {
  color: var(--cyan);
  text-decoration: none;
  font-weight: 600;
  transition: opacity 0.2s;
}
.login-back a:hover { opacity: 0.75; }

/* ── Séparateur ──────────────────────────────────────────── */
.login-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 26px 0 20px;
  color: var(--muted);
  font-size: 11px;
  letter-spacing: 1px;
}
.login-divider::before,
.login-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border2);
}

/* ── Footer ──────────────────────────────────────────────── */
.login-footer {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 16px 20px 24px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 1px;
  border-top: 1px solid var(--border2);
}

/* ── Ligne de scan (HUD) ─────────────────────────────────── */
.scan-h {
  position: fixed;
  left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(0,200,255,0.25) 30%,
    rgba(0,200,255,0.5) 50%,
    rgba(0,200,255,0.25) 70%,
    transparent 100%);
  animation: scan-h 5s linear infinite;
  pointer-events: none;
  z-index: 1;
}
@keyframes scan-h {
  0%   { top: -2px; }
  100% { top: 100vh; }
}
</style>
</head>
<body>

<!-- Ligne de scan HUD -->
<div class="scan-h"></div>

<!-- Top bar logo -->
<div class="login-topbar">
  <a href="index.html" class="login-logo">
    <img src="assets/images/vertextrack-logo.png" alt="VertexTrack">
    <span class="login-logo-text">VERTEX<span>TRACK</span></span>
  </a>
</div>

<!-- Carte principale -->
<div class="login-wrap">
  <div class="login-card">

    <div class="login-tag">// ACCÈS PLATEFORME</div>
    <h1 class="login-title">Connexion</h1>
    <p class="login-subtitle">
      Plateforme d'analyse biomécanique · Prévention LCA<br>
      Université Hassan 1<sup>er</sup> — Settat
    </p>

    <form id="login-form" novalidate>
      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="email">Adresse e-mail</label>
        <input
          id="email"
          type="email"
          class="form-input"
          placeholder="prenom.nom@uh1.ac.ma"
          autocomplete="email"
          required
        />
      </div>

      <!-- Mot de passe -->
      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <div class="pwd-wrap">
          <input
            id="password"
            type="password"
            class="form-input"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="pwd-toggle" id="pwd-toggle" title="Afficher/masquer">
            👁
          </button>
        </div>
      </div>

      <!-- Bouton connexion -->
      <button type="submit" class="btn-login" id="btn-login">
        <div class="spinner"></div>
        <span class="btn-text">SE CONNECTER →</span>
      </button>
    </form>

    <!-- Message retour -->
    <div class="login-msg" id="login-msg"></div>

    <div class="login-divider">VERTEXTRACK SECURE</div>

    <div class="login-back">
      <a href="index.html">← Retour à l'accueil</a>
    </div>

  </div>
</div>

<!-- Footer -->
<div class="login-footer">
  VERTEXTRACK © 2026 · Université Hassan 1<sup>er</sup> · Master TDTS · Supervisé par Dr. Ali Benaissa
</div>

<!-- ── Script d'authentification (module ESM) ──────────────── -->
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// Identifiants Supabase
const SUPABASE_URL = 'https://kygrhqgyqqrylsxnshny.supabase.co';
const SUPABASE_KEY = 'sb_publishable_xEGDhI4c53TSQZOYrygUuA_4YTRjlNf';
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Rediriger si déjà connecté ─────────────────────────────
const { data: { session: existing } } = await supabase.auth.getSession();
if (existing) {
  window.location.replace('dashboard.html');
}

// ── Références DOM ─────────────────────────────────────────
const form     = document.getElementById('login-form');
const emailEl  = document.getElementById('email');
const pwdEl    = document.getElementById('password');
const pwdToggle= document.getElementById('pwd-toggle');
const btnLogin = document.getElementById('btn-login');
const msgEl    = document.getElementById('login-msg');

// ── Toggle affichage mot de passe ──────────────────────────
pwdToggle.addEventListener('click', () => {
  const isText = pwdEl.type === 'text';
  pwdEl.type   = isText ? 'password' : 'text';
  pwdToggle.textContent = isText ? '👁' : '🙈';
});

// ── Afficher un message (erreur ou succès) ─────────────────
function showMsg(text, type = 'error') {
  msgEl.textContent = text;
  msgEl.className   = `login-msg ${type}`;
}
function hideMsg() {
  msgEl.className   = 'login-msg';
}

// ── État chargement ────────────────────────────────────────
function setLoading(on) {
  btnLogin.disabled = on;
  btnLogin.classList.toggle('loading', on);
}

// ── Soumission du formulaire ───────────────────────────────
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  hideMsg();

  const email    = emailEl.value.trim();
  const password = pwdEl.value;

  // Validation basique
  if (!email) {
    showMsg('Veuillez saisir votre adresse e-mail.');
    emailEl.focus();
    return;
  }
  if (!password) {
    showMsg('Veuillez saisir votre mot de passe.');
    pwdEl.focus();
    return;
  }

  setLoading(true);

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  setLoading(false);

  if (error) {
    // Messages d'erreur en français
    let msg = 'Erreur de connexion. Veuillez réessayer.';
    if (error.message.includes('Invalid login credentials')) {
      msg = 'Identifiants incorrects. Vérifiez votre e-mail et mot de passe.';
    } else if (error.message.includes('Email not confirmed')) {
      msg = 'Adresse e-mail non confirmée. Consultez votre boîte mail.';
    } else if (error.message.includes('Too many requests')) {
      msg = 'Trop de tentatives. Veuillez patienter quelques minutes.';
    } else if (error.message.includes('User not found')) {
      msg = 'Aucun compte trouvé pour cet e-mail.';
    }
    showMsg(msg, 'error');
    return;
  }

  // Connexion réussie
  showMsg('Connexion réussie ! Redirection…', 'success');
  setTimeout(() => {
    window.location.replace('dashboard.html');
  }, 800);
});
</script>

</body>
</html>
